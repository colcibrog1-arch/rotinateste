
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina do Shape</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#000;
color:#fff;
}

header{
text-align:center;
padding:18px;
font-size:24px;
font-weight:700;
border-bottom:1px solid #222;
}

.page{
display:none;
padding:20px;
max-width:500px;
margin:auto;
}

.active{
display:block;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:12px;
padding:16px;
margin-bottom:14px;
}

button{
background:#fff;
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
margin-top:10px;
cursor:pointer;
}

.done{
opacity:.4;
text-decoration:line-through;
}

.progressBar{
width:100%;
height:14px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
background:#fff;
width:0%;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#0a0a0a;
border-top:1px solid #222;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav div{
cursor:pointer;
font-size:14px;
}

.water{
font-size:28px;
margin:10px 0;
}

</style>
</head>

<body>

<header>💪 Rotina do Shape</header>

<!-- DASHBOARD -->

<div class="page active" id="home">

<div class="card">
🔥 Streak: <span id="streak">0</span> dias
</div>

<div class="card">

📊 Progresso hoje

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div id="progressText">0%</div>

</div>

<div class="card">

⏰ Próxima tarefa

<div id="nextTask">
Carregando...
</div>

</div>

</div>

<!-- ROTINA -->

<div class="page" id="rotina">

<div id="tasks"></div>

</div>

<!-- ÁGUA -->

<div class="page" id="agua">

<div class="card">

💧 Água hoje

<div class="water" id="waterCount">
0 / 8
</div>

<button onclick="addWater()">+1 copo</button>

<button onclick="resetWater()">Reset</button>

</div>

</div>

<!-- CONFIGURAÇÕES -->

<div class="page" id="config">

<div class="card">

🔔 Notificações

<br>

<button onclick="ativarAvisos()">
Ativar notificações
</button>

</div>

<div class="card">

🧹 Resetar progresso do dia

<br>

<button onclick="resetDay()">
Resetar tarefas
</button>

</div>

</div>

<!-- NAVBAR -->

<div class="nav">

<div onclick="openPage('home')">🏠</div>
<div onclick="openPage('rotina')">📋</div>
<div onclick="openPage('agua')">💧</div>
<div onclick="openPage('config')">⚙️</div>

</div>

<script>

const rotina=[

{time:"05:10",task:"Hipercalórico + creatina"},
{time:"06:30",task:"Whey + creatina"},
{time:"10:00",task:"Fruta"},
{time:"12:00",task:"Almoço + creatina"},
{time:"19:00",task:"Lanche"},
{time:"23:00",task:"Jantar + suplementos"}

];

function openPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

const tasksDiv=document.getElementById("tasks");

let tasksDone=JSON.parse(localStorage.getItem("tasksDone")||"[]");

rotina.forEach((r,i)=>{

let card=document.createElement("div");
card.className="card";
card.id="task"+i;

card.innerHTML=`
<b>${r.time}</b>
<br>
${r.task}
<br>
<button onclick="done(${i})">Concluir</button>
`;

tasksDiv.appendChild(card);

if(tasksDone.includes(i)){
card.classList.add("done");
}

});

function done(i){

let card=document.getElementById("task"+i);

card.classList.toggle("done");

if(tasksDone.includes(i)){
tasksDone=tasksDone.filter(t=>t!==i);
}else{
tasksDone.push(i);
}

localStorage.setItem("tasksDone",JSON.stringify(tasksDone));

updateProgress();
updateNext();

}

function updateProgress(){

let percent=Math.floor((tasksDone.length/rotina.length)*100);

document.getElementById("progress").style.width=percent+"%";

document.getElementById("progressText").innerText=percent+"%";

}

updateProgress();

function updateNext(){

if(tasksDone.length===rotina.length){

document.getElementById("nextTask").innerText=
"✅ Todas as tarefas do dia foram concluídas";

return;

}

let now=new Date();

let current=now.getHours()*60+now.getMinutes();

for(let r of rotina){

let parts=r.time.split(":");

let t=parseInt(parts[0])*60+parseInt(parts[1]);

if(t>current){

document.getElementById("nextTask").innerText=
r.time+" - "+r.task;

return;

}

}

document.getElementById("nextTask").innerText=
"⚠️ Ainda existem tarefas pendentes";

}

setInterval(updateNext,60000);

updateNext();

let streak=localStorage.getItem("streak")||0;

document.getElementById("streak").innerText=streak;

let water=parseInt(localStorage.getItem("water")||0);

function updateWater(){

document.getElementById("waterCount").innerText=
water+" / 8";

}

function addWater(){

if(water<8){
water++;
localStorage.setItem("water",water);
updateWater();
}

}

function resetWater(){

water=0;
localStorage.setItem("water",water);
updateWater();

}

updateWater();

function ativarAvisos(){

if(Notification.permission!=="granted"){
Notification.requestPermission();
}else{
alert("Notificações já ativadas");
}

}

function resetDay(){

localStorage.setItem("tasksDone","[]");
location.reload();

}

</script>

</body>
</html>
