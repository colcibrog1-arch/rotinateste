<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina do Shape</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
}

header{
text-align:center;
padding:25px 10px;
font-size:26px;
font-weight:700;
}

.container{
max-width:500px;
margin:auto;
padding:10px 16px 40px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:16px;
margin-bottom:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.35);
}

.time{
font-size:18px;
font-weight:700;
}

.task{
margin-top:6px;
font-size:15px;
opacity:.9;
}

button{
margin-top:10px;
background:#22c55e;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
font-size:14px;
}

.done{
opacity:.45;
text-decoration:line-through;
}

footer{
text-align:center;
opacity:.6;
font-size:12px;
margin-top:25px;
}

.install{
display:block;
margin:12px auto;
background:#16a34a;
padding:10px 18px;
border-radius:10px;
text-align:center;
width:200px;
cursor:pointer;
}
</style>
</head>

<body>

<header>💪 Rotina do Shape</header>

<div class="container">

<div class="install" onclick="ativarAvisos()">Ativar lembretes</div>

<div id="tasks"></div>

</div>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

const rotina=[
{time:"05:10",task:"Hipercalórico + 5g creatina"},
{time:"06:30",task:"Whey + 5g creatina"},
{time:"10:00",task:"Fruta"},
{time:"12:00",task:"Almoço + 5g creatina"},
{time:"19:00",task:"Lanche na faculdade"},
{time:"23:00",task:"Jantar + creatina + Cobavital + Complexo B"}
];

const container=document.getElementById("tasks");

function renderTasks(){

container.innerHTML="";

rotina.forEach((r,i)=>{
let div=document.createElement("div");
div.className="card";
div.id="task"+i;

div.innerHTML=`
<div class="time">${r.time}</div>
<div class="task">${r.task}</div>
<button onclick="done(${i})">Concluir</button>
`;

container.appendChild(div);

});

}

renderTasks();

function done(i){
document.getElementById("task"+i).classList.toggle("done");
}

function ativarAvisos(){

if(Notification.permission!=="granted"){

Notification.requestPermission().then(p=>{
alert("Permissão: "+p);
});

}else{

alert("Avisos já ativados.");

}

}

function checkTime(){

const now=new Date();
const day=now.getDay();

if(day===0||day===6){
return;
}

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');
const current=h+":"+m;

rotina.forEach(r=>{

if(r.time===current){

if(Notification.permission==="granted"){

new Notification("Rotina do Shape",{
body:r.task
});

}else{

alert("Hora de: "+r.task);

}

}

});

}

setInterval(checkTime,30000);

/* RESET AUTOMÁTICO À MEIA NOITE */

function checkReset(){

const now=new Date();
const h=now.getHours();
const m=now.getMinutes();

if(h===0 && m===0){

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("done");
});

}

}

setInterval(checkReset,30000);

</script>

</body>
</html>
