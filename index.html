```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina do Shape</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#000;
color:#fff;
}

header{
text-align:center;
padding:25px 10px;
font-size:26px;
font-weight:700;
border-bottom:1px solid #222;
}

.streak{
text-align:center;
font-size:18px;
margin:15px 0;
}

.week{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.day{
background:#111;
padding:8px 12px;
border-radius:8px;
border:1px solid #222;
font-size:13px;
}

.doneDay{
background:#fff;
color:#000;
}

.container{
max-width:500px;
margin:auto;
padding:10px 16px 40px;
}

.card{
background:#0f0f0f;
border-radius:14px;
padding:16px;
margin-bottom:12px;
border:1px solid #1f1f1f;
}

.time{
font-size:18px;
font-weight:700;
}

.task{
margin-top:6px;
font-size:15px;
opacity:.85;
}

button{
margin-top:10px;
background:#fff;
border:none;
color:#000;
padding:8px 14px;
border-radius:8px;
font-size:14px;
font-weight:600;
}

button:active{
transform:scale(.97);
}

.done{
opacity:.35;
text-decoration:line-through;
}

.complete{
text-align:center;
font-size:20px;
margin-top:20px;
color:#fff;
}

.install{
display:block;
margin:12px auto 20px auto;
background:#fff;
color:#000;
padding:10px 18px;
border-radius:10px;
text-align:center;
width:200px;
cursor:pointer;
font-weight:600;
}

</style>
</head>

<body>

<header>💪 Rotina do Shape</header>

<div class="streak">
🔥 Dias seguidos: <span id="streak">0</span>
</div>

<div class="week">
<div class="day" id="d1">SEG</div>
<div class="day" id="d2">TER</div>
<div class="day" id="d3">QUA</div>
<div class="day" id="d4">QUI</div>
<div class="day" id="d5">SEX</div>
</div>

<div class="container">

<div class="install" onclick="ativarAvisos()">
Ativar lembretes
</div>

<div id="tasks"></div>

<div id="complete" class="complete"></div>

</div>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

const rotina=[

{time:"05:10",task:"Hipercalórico + 5g creatina"},
{time:"06:30",task:"Whey + 5g creatina"},
{time:"10:00",task:"Fruta"},
{time:"12:00",task:"Almoço + 5g creatina"},
{time:"19:00",task:"Lanche na faculdade"},
{time:"23:00",task:"Jantar + creatina + Cobavital + Complexo B"}

];

const container=document.getElementById("tasks");

let streak=localStorage.getItem("streak") || 0;
document.getElementById("streak").innerText=streak;

let history=JSON.parse(localStorage.getItem("weekHistory") || "{}");

function updateWeek(){

for(let i=1;i<=5;i++){

if(history[i]){
document.getElementById("d"+i).classList.add("doneDay");
}

}

}

updateWeek();

function renderTasks(){

container.innerHTML="";

rotina.forEach((r,i)=>{

let div=document.createElement("div");
div.className="card";
div.id="task"+i;

div.innerHTML=`

<div class="time">${r.time}</div>
<div class="task">${r.task}</div>
<button onclick="done(${i})">Concluir</button>

`;

container.appendChild(div);

});

}

renderTasks();

function done(i){

let card=document.getElementById("task"+i);
card.classList.toggle("done");

checkComplete();

}

function checkComplete(){

let total=rotina.length;
let done=document.querySelectorAll(".done").length;

if(done===total){

document.getElementById("complete").innerHTML="🏆 Rotina completa hoje!";

let today=new Date();
let todayStr=today.toDateString();
let last=localStorage.getItem("lastComplete");

let day=today.getDay();

if(day>=1 && day<=5){

history[day]=true;

localStorage.setItem("weekHistory",JSON.stringify(history));

updateWeek();

}

if(last!==todayStr){

streak++;

localStorage.setItem("streak",streak);

localStorage.setItem("lastComplete",todayStr);

document.getElementById("streak").innerText=streak;

}

}

}

function ativarAvisos(){

if(Notification.permission!=="granted"){

Notification.requestPermission().then(p=>{
alert("Permissão: "+p);
});

}else{

alert("Avisos já ativados");

}

}

function checkTime(){

const now=new Date();
const day=now.getDay();

if(day===0 || day===6){
return;
}

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');

const current=h+":"+m;

rotina.forEach(r=>{

if(r.time===current){

if(Notification.permission==="granted"){

new Notification("Rotina do Shape",{
body:r.task
});

}else{

alert("Hora de: "+r.task);

}

}

});

}

setInterval(checkTime,60000);

</script>

</body>
</html>
