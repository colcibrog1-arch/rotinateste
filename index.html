<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#000000">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina do Shape</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#000;
color:#fff;
}

header{
text-align:center;
padding:18px;
font-size:24px;
font-weight:700;
border-bottom:1px solid #222;
}

.page{
display:none;
padding:20px;
max-width:500px;
margin:auto;
padding-bottom:120px;
}

.active{
display:block;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:12px;
padding:16px;
margin-bottom:14px;
}

button{
background:#fff;
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

.days label{
margin-right:8px;
font-size:13px;
}

.done{
opacity:.4;
text-decoration:line-through;
}

.progressBar{
width:100%;
height:14px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
background:#fff;
width:0%;
}

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0a0a0a;
border-top:1px solid #222;
display:flex;
justify-content:center;
align-items:center;
gap:30px;
padding:16px 0 calc(22px + env(safe-area-inset-bottom));
font-size:28px;
}

.nav div{
display:flex;
align-items:center;
justify-content:center;
width:60px;
height:60px;
border-radius:14px;
cursor:pointer;
}

.activeTab{
background:#fff;
color:#000;
}

.water{
font-size:28px;
margin:10px 0;
}

</style>
</head>

<body>

<header>💪 Rotina do Shape</header>

<!-- HOME -->

<div class="page active" id="home">

<div class="card">
🔥 Streak: <span id="streak">0</span> dias
</div>

<div class="card">
📊 Progresso hoje
<div class="progressBar">
<div class="progress" id="progress"></div>
</div>
<div id="progressText">0%</div>
</div>

<div class="card">
⏰ Próxima tarefa
<div id="nextTask">Carregando...</div>
</div>

</div>

<!-- ROTINA -->

<div class="page" id="rotina">
<div id="tasks"></div>
</div>

<!-- ÁGUA -->

<div class="page" id="agua">
<div class="card">
💧 Água hoje
<div class="water" id="waterCount">0 / 8</div>
<button onclick="addWater()">+1 Garrafa</button>
<button onclick="resetWater()">Reset</button>
</div>
</div>

<!-- CONFIG -->

<div class="page" id="config">

<div class="card">
🔔 Notificações
<br>
<button onclick="ativarAvisos()">Ativar notificações</button>
</div>

<div class="card">
⚙️ Rotina
<br><br>
<button onclick="openConfigPage('menuRotina')">Gerenciar rotina</button>
</div>

</div>

<!-- MENU ROTINA -->

<div class="page" id="menuRotina">

<div class="card">

<h3>Gerenciar rotina</h3>

<button onclick="openConfigPage('editarTarefa')">✏️ Editar tarefa</button>

<br><br>

<button onclick="openConfigPage('criarTarefa')">➕ Criar tarefa</button>

<br><br>

<button onclick="openConfigPage('excluirTarefa')">🗑 Excluir tarefa</button>

<br><br>

<button onclick="openPage('config',document.querySelector('.nav div:nth-child(4)'))">
⬅ Voltar
</button>

</div>

</div>

<!-- EDITAR -->

<div class="page" id="editarTarefa">

<div class="card">

<h3>Editar tarefa</h3>

<div id="editarLista"></div>

<button onclick="openConfigPage('menuRotina')">⬅ Voltar</button>

</div>

</div>

<!-- CRIAR -->

<div class="page" id="criarTarefa">

<div class="card">

<h3>Criar tarefa</h3>

Horário
<input type="time" id="novoHorario">

Nome
<input type="text" id="novoNome">

<div class="days">
<label><input type="checkbox" value="1">Seg</label>
<label><input type="checkbox" value="2">Ter</label>
<label><input type="checkbox" value="3">Qua</label>
<label><input type="checkbox" value="4">Qui</label>
<label><input type="checkbox" value="5">Sex</label>
<label><input type="checkbox" value="6">Sab</label>
<label><input type="checkbox" value="0">Dom</label>
</div>

<button onclick="criarTarefa()">Criar</button>

<br><br>

<button onclick="openConfigPage('menuRotina')">⬅ Voltar</button>

</div>

</div>

<!-- EXCLUIR -->

<div class="page" id="excluirTarefa">

<div class="card">

<h3>Excluir tarefa</h3>

<div id="excluirLista"></div>

<button onclick="openConfigPage('menuRotina')">⬅ Voltar</button>

</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="activeTab" onclick="openPage('home',this)">🏠</div>
<div onclick="openPage('rotina',this)">📋</div>
<div onclick="openPage('agua',this)">💧</div>
<div onclick="openPage('config',this)">⚙️</div>

</div>

<script>

let rotina = JSON.parse(localStorage.getItem("rotina")) || [
{time:"05:10",task:"Aveia + Leite + Creatina",days:[1,2,3,4,5]},
{time:"07:30",task:"Whey + Creatina",days:[1,2,3,4,5]},
{time:"10:00",task:"Fruta",days:[1,2,3,4,5]},
{time:"12:00",task:"Almoço + Creatina",days:[1,2,3,4,5]},
{time:"19:00",task:"Hipercalórico",days:[1,2,3,4,5]},
{time:"23:00",task:"Jantar + Creatina + Vitaminas",days:[1,2,3,4,5]}
];

const today=new Date().toDateString();
let savedDate=localStorage.getItem("date");

if(savedDate!==today){
  localStorage.setItem("date",today);
  localStorage.setItem("tasksDone","[]");
  localStorage.setItem("notificadas","[]");
}

// tarefas do dia
function tarefasHoje(){
  let hoje=new Date().getDay();
  return rotina.filter(t=>!t.days || t.days.includes(hoje));
}

// renderização de páginas
function openPage(id,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav div").forEach(b=>b.classList.remove("activeTab"));
  el.classList.add("activeTab");
}

function openConfigPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// armazenamento das tarefas concluídas
let tasksDone = JSON.parse(localStorage.getItem("tasksDone")||"[]");

// renderizar tarefas com persistência
function renderTasks(){
  const tasksDiv=document.getElementById("tasks");
  tasksDiv.innerHTML="";
  tarefasHoje().forEach((r,i)=>{
    let idUnico = r.time + "|" + r.task;
    let doneClass = tasksDone.includes(idUnico) ? "done" : "";

    let card=document.createElement("div");
    card.className="card " + doneClass;
    card.id="task"+i;

    card.innerHTML=`
      <b>${r.time}</b><br>
      ${r.task}<br>
      <button onclick="done(${i})">Concluir</button>
    `;

    tasksDiv.appendChild(card);
  });
}

// marcar como concluída
function done(i){
  const tarefa = tarefasHoje()[i];
  const id = tarefa.time + "|" + tarefa.task;

  let card = document.getElementById("task"+i);
  card.classList.toggle("done");

  if(tasksDone.includes(id)){
    tasksDone = tasksDone.filter(t => t!==id);
  } else {
    tasksDone.push(id);
  }

  localStorage.setItem("tasksDone", JSON.stringify(tasksDone));

  updateProgress();
  updateNext();
}

// progresso
function updateProgress(){
  let total = tarefasHoje().length;
  if(total === 0){
    document.getElementById("progress").style.width="0%";
    document.getElementById("progressText").innerText="0%";
    return;
  }
  let countDone = tasksDone.filter(tid=>{
    return tarefasHoje().some(t=> (t.time+"|"+t.task)===tid );
  }).length;
  let percent = Math.floor((countDone / total) * 100);
  if(percent > 100) percent = 100;
  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("progressText").innerText = percent + "%";
}

// próxima tarefa
function updateNext(){
  let next=document.getElementById("nextTask");
  let lista=tarefasHoje();
  if(lista.length===0){
    next.innerText="Nenhuma tarefa para hoje";
    return;
  }
  let now=new Date();
  let current=now.getHours()*60+now.getMinutes();
  for(let r of lista){
    let parts=r.time.split(":");
    let t=parseInt(parts[0])*60+parseInt(parts[1]);
    let id = r.time + "|" + r.task;
    if(t>current && !tasksDone.includes(id)){
      next.innerText=r.time+" - "+r.task;
      return;
    }
  }
  if(tasksDone.length>=lista.length){
    next.innerText="✅ Todas as tarefas concluídas";
  } else {
    next.innerText="Sem tarefas restantes hoje";
  }
}

/* água */
let water=parseInt(localStorage.getItem("water")||0);
function updateWater(){ document.getElementById("waterCount").innerText=water+" / 8"; }
function addWater(){ if(water<8){ water++; localStorage.setItem("water",water); updateWater(); } }
function resetWater(){ water=0; localStorage.setItem("water",water); updateWater(); }
updateWater();

/* notificações */
function ativarAvisos(){
  if(Notification.permission!=="granted"){
    Notification.requestPermission().then(p=>{
      if(p==="granted") alert("Notificações ativadas!");
    });
  }else{
    alert("Notificações já ativadas");
  }
}

function verificarNotificacoes(){
  if(Notification.permission!=="granted") return;
  const agora=new Date();
  const horaAtual = agora.getHours().toString().padStart(2,"0");
  const minutoAtual = agora.getMinutes().toString().padStart(2,"0");
  const horarioAtual = horaAtual + ":" + minutoAtual;

  let notificadas = JSON.parse(localStorage.getItem("notificadas")||"[]");

  tarefasHoje().forEach((t,i)=>{
    let id = t.time + "|" + t.task;
    if(t.time <= horarioAtual && !notificadas.includes(id)){
      new Notification("Rotina do Shape 💪",{ body: t.task, icon:"icon-192.png" });
      notificadas.push(id);
    }
  });

  localStorage.setItem("notificadas", JSON.stringify(notificadas));
}

/* render inicial */
renderTasks();
updateProgress();
updateNext();

setInterval(verificarNotificacoes,10000); // checa a cada 10s

</script>

</body>
</html>
