
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina do Shape</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#000;
color:#fff;
}

header{
text-align:center;
padding:18px;
font-size:24px;
font-weight:700;
border-bottom:1px solid #222;
}

.page{
display:none;
padding:20px;
max-width:500px;
margin:auto;
padding-bottom:120px;
}

.active{
display:block;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:12px;
padding:16px;
margin-bottom:14px;
}

button{
background:#fff;
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
margin-top:10px;
cursor:pointer;
}

.done{
opacity:.4;
text-decoration:line-through;
}

.progressBar{
width:100%;
height:14px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
background:#fff;
width:0%;
}

/* NAVBAR NOVA */

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0a0a0a;
border-top:1px solid #222;

display:flex;
justify-content:center;
align-items:center;
gap:30px;

padding:16px 0 calc(22px + env(safe-area-inset-bottom));

font-size:28px;
}

.nav div{

display:flex;
align-items:center;
justify-content:center;

width:60px;
height:60px;

border-radius:14px;

cursor:pointer;

transition:0.2s;

}

.nav div:hover{
background:#1a1a1a;
}

.activeTab{
background:#ffffff;
color:#000;
}

.water{
font-size:28px;
margin:10px 0;
}

#perfectDay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:30px;
font-weight:700;
z-index:999;
}

</style>
</head>

<body>

<header>💪 Rotina do Shape</header>

<div id="perfectDay">
🏆 DIA PERFEITO<br>
+1 STREAK
</div>

<!-- HOME -->

<div class="page active" id="home">

<div class="card">
🔥 Streak: <span id="streak">0</span> dias
</div>

<div class="card">

📊 Progresso hoje

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div id="progressText">0%</div>

</div>

<div class="card">

⏰ Próxima tarefa

<div id="nextTask">
Carregando...
</div>

</div>

</div>

<!-- ROTINA -->

<div class="page" id="rotina">

<div id="tasks"></div>

</div>

<!-- ÁGUA -->

<div class="page" id="agua">

<div class="card">

💧 Água hoje

<div class="water" id="waterCount">
0 / 8
</div>

<button onclick="addWater()">+1 copo</button>
<button onclick="resetWater()">Reset</button>

</div>

</div>

<!-- CONFIG -->

<div class="page" id="config">

<div class="card">

🔔 Notificações

<br>

<button onclick="ativarAvisos()">
Ativar notificações
</button>

</div>

<div class="card">

🧹 Resetar tarefas do dia

<br>

<button onclick="resetDay()">
Resetar tarefas
</button>

</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="activeTab" onclick="openPage('home',this)">🏠</div>
<div onclick="openPage('rotina',this)">📋</div>
<div onclick="openPage('agua',this)">💧</div>
<div onclick="openPage('config',this)">⚙️</div>

</div>

<script>

const rotina=[

{time:"05:10",task:"Hipercalórico + creatina"},
{time:"06:30",task:"Whey + creatina"},
{time:"10:00",task:"Fruta"},
{time:"12:00",task:"Almoço + creatina"},
{time:"19:00",task:"Lanche"},
{time:"23:00",task:"Jantar + suplementos"}

];

function openPage(id,el){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav div").forEach(b=>{
b.classList.remove("activeTab");
});

el.classList.add("activeTab");

}

const today=new Date().toDateString();
let savedDate=localStorage.getItem("date");

if(savedDate!==today){

localStorage.setItem("date",today);
localStorage.setItem("tasksDone","[]");
localStorage.setItem("water","0");
localStorage.setItem("streakCounted","false");

}

const tasksDiv=document.getElementById("tasks");

let tasksDone=JSON.parse(localStorage.getItem("tasksDone")||"[]");

rotina.forEach((r,i)=>{

let card=document.createElement("div");
card.className="card";
card.id="task"+i;

card.innerHTML=`
<b>${r.time}</b><br>
${r.task}<br>
<button onclick="done(${i})">Concluir</button>
`;

tasksDiv.appendChild(card);

if(tasksDone.includes(i)){
card.classList.add("done");
}

});

function done(i){

let card=document.getElementById("task"+i);

card.classList.toggle("done");

if(tasksDone.includes(i)){
tasksDone=tasksDone.filter(t=>t!==i);
}else{
tasksDone.push(i);
}

localStorage.setItem("tasksDone",JSON.stringify(tasksDone));

updateProgress();
updateNext();
checkPerfectDay();

}

function updateProgress(){

let percent=Math.floor((tasksDone.length/rotina.length)*100);

document.getElementById("progress").style.width=percent+"%";
document.getElementById("progressText").innerText=percent+"%";

}

updateProgress();

function updateNext(){

if(tasksDone.length===rotina.length){

document.getElementById("nextTask").innerText=
"✅ Todas as tarefas do dia foram concluídas";

return;

}

let now=new Date();

let current=now.getHours()*60+now.getMinutes();

for(let r of rotina){

let parts=r.time.split(":");

let t=parseInt(parts[0])*60+parseInt(parts[1]);

if(t>current){

document.getElementById("nextTask").innerText=
r.time+" - "+r.task;

return;

}

}

document.getElementById("nextTask").innerText=
"⚠️ Ainda existem tarefas pendentes";

}

setInterval(updateNext,60000);

updateNext();

let streak=parseInt(localStorage.getItem("streak")||0);

document.getElementById("streak").innerText=streak;

function checkPerfectDay(){

if(tasksDone.length===rotina.length){

let counted=localStorage.getItem("streakCounted");

if(counted!=="true"){

streak++;

localStorage.setItem("streak",streak);
localStorage.setItem("streakCounted","true");

document.getElementById("streak").innerText=streak;

showPerfect();

}

}

}

function showPerfect(){

let el=document.getElementById("perfectDay");

el.style.display="flex";

setTimeout(()=>{
el.style.display="none";
},3000);

}

let water=parseInt(localStorage.getItem("water")||0);

function updateWater(){

document.getElementById("waterCount").innerText=
water+" / 8";

}

function addWater(){

if(water<8){
water++;
localStorage.setItem("water",water);
updateWater();
}

}

function resetWater(){

water=0;
localStorage.setItem("water",water);
updateWater();

}

updateWater();

function ativarAvisos(){

if(Notification.permission!=="granted"){
Notification.requestPermission();
}else{
alert("Notificações já ativadas");
}

}

function resetDay(){

localStorage.setItem("tasksDone","[]");
location.reload();

}

</script>

</body>
</html>
